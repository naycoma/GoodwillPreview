name: CI

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:

jobs:
  setup:
    runs-on: ubuntu-latest
    outputs:
      matrix: ${{ steps.set-matrix.outputs.matrix }}
    steps:
      - uses: actions/checkout@v4
      - id: set-matrix
        run: |
          matrix=$(ls -d [0-9]*.[0-9]*/ | tr -d '/' | jq -R . | jq -sc .)
          echo "matrix=$matrix" >> $GITHUB_OUTPUT

  build:
    needs: setup
    runs-on: ubuntu-latest
    container:
      image: ${{ vars.IMAGE }}:${{ matrix.game_version }}
    strategy:
      matrix:
        game_version: ${{ fromJson(needs.setup.outputs.matrix) }}

    steps:
      - uses: actions/checkout@v4

      - name: Build
        run: >-
          dotnet build mod.csproj
          -c Release
          -p:BuildOnly=true
          -p:TargetGameVersion=${{ matrix.game_version }}
          -p:OutputPath=out/

      - uses: actions/upload-artifact@v7
        with:
          name: binary-${{ matrix.game_version }}
          path: out/GoodwillPreview.dll

  pack:
    needs: [setup, build]
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download binaries
        uses: actions/download-artifact@v4
        with:
          pattern: binary-*
          path: binaries/

      - name: Place assemblies
        run: |
          for dir in binaries/binary-*/; do
            ver=$(basename "$dir" | sed 's/binary-//')
            rsync -a "$dir" "$ver/Assemblies/"
          done

      - name: Package
        run: >-
          zip -r "${{ github.event.repository.name }}.zip"
          About Common LoadFolders.xml 1.*/
          --exclude='*/Source/*'

      - name: Upload artifact
        if: github.ref_type != 'tag'
        uses: actions/upload-artifact@v7
        with:
          path: ${{ github.event.repository.name }}.zip
          archive: false

      - name: Create release
        if: github.ref_type == 'tag'
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ github.event.repository.name }}.zip
